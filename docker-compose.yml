version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: cbg_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       custom_board_games
      POSTGRES_USER:     cbg_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test:     ["CMD-SHELL","pg_isready -U cbg_user -d custom_board_games"]
      interval: 10s
      timeout:  5s
      retries:  5

  redis:
    image: redis:7-alpine
    container_name: cbg_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"
    healthcheck:
      test:     ["CMD","redis-cli","ping"]
      interval: 10s
      timeout:  3s
      retries:  5

  backend:
    build:
      context:    ./backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: cbg_backend
    restart: unless-stopped
    env_file: ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3000:3000"
    volumes:
      - ./backend/logs:/app/logs

  frontend:
    build:
      context:    .
      dockerfile: ./docker/Dockerfile.frontend
    container_name: cbg_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  pgdata:
  redisdata: