<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>自定义棋局设计器</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:        #0d1117;
    --surface:   #161b22;
    --surface2:  #21262d;
    --border:    #30363d;
    --primary:   #e94560;
    --text:      #e6edf3;
    --muted:     #8b949e;
    --success:   #3fb950;
    --warning:   #d29922;
    --sidebar-w: 260px;
    --toolbar-h: 52px;
  }
  body {
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    height: 100vh; overflow: hidden; display: flex; flex-direction: column;
  }
  .toolbar {
    height: var(--toolbar-h); background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; padding: 0 16px; gap: 8px;
    flex-shrink: 0; z-index: 100;
  }
  .toolbar-brand { font-weight: 700; color: var(--primary); font-size: 16px; margin-right: 8px; }
  .toolbar-sep   { width: 1px; height: 24px; background: var(--border); margin: 0 4px; }
  .tbtn {
    padding: 6px 12px; border: 1px solid var(--border); border-radius: 6px;
    background: none; color: var(--text); font-size: 13px; cursor: pointer;
    transition: background .15s; display: flex; align-items: center; gap: 5px;
  }
  .tbtn:hover { background: var(--surface2); }
  .tbtn.active { background: var(--primary); border-color: var(--primary); color: #fff; }
  .toolbar-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
  .user-chip {
    display: flex; align-items: center; gap: 8px;
    padding: 5px 12px; border-radius: 20px;
    background: var(--surface2); border: 1px solid var(--border);
    font-size: 13px; cursor: pointer;
  }
  .avatar {
    width: 24px; height: 24px; border-radius: 50%;
    background: var(--primary); display: flex; align-items: center;
    justify-content: center; font-size: 11px; font-weight: 700; color: #fff;
  }
  .main { display: flex; flex: 1; overflow: hidden; }
  .sidebar {
    width: var(--sidebar-w); background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column; flex-shrink: 0; overflow: hidden;
  }
  .panel-tabs { display: flex; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .ptab {
    flex: 1; padding: 10px 4px; background: none; border: none;
    color: var(--muted); font-size: 12px; cursor: pointer;
    border-bottom: 2px solid transparent; margin-bottom: -1px;
    transition: color .2s, border-color .2s;
  }
  .ptab.active { color: var(--primary); border-bottom-color: var(--primary); }
  .panel-body { flex: 1; overflow-y: auto; padding: 12px; }
  .panel-section { margin-bottom: 16px; }
  .panel-section h4 {
    font-size: 11px; text-transform: uppercase; letter-spacing: .8px;
    color: var(--muted); margin-bottom: 8px; padding: 0 2px;
  }
  .piece-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
  .piece-item {
    aspect-ratio: 1; border: 1px solid var(--border); border-radius: 8px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    cursor: grab; transition: border-color .2s, background .2s; font-size: 22px;
    background: var(--surface2); user-select: none; gap: 2px;
  }
  .piece-item span { font-size: 10px; color: var(--muted); }
  .piece-item:hover { border-color: var(--primary); background: rgba(233,69,96,.08); }
  .piece-item.sel { border-color: var(--primary); background: rgba(233,69,96,.15); }
  .color-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .color-dot {
    width: 28px; height: 28px; border-radius: 50%; cursor: pointer;
    border: 2px solid transparent; transition: border-color .2s, transform .15s;
  }
  .color-dot:hover  { transform: scale(1.15); }
  .color-dot.active { border-color: var(--text); }
  .prop-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .prop-label { font-size: 13px; color: var(--muted); }
  .prop-input {
    background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
    padding: 4px 8px; color: var(--text); font-size: 13px; width: 90px; text-align: right;
  }
  .prop-input:focus { outline: none; border-color: var(--primary); }
  .canvas-wrap { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .canvas-toolbar {
    height: 40px; background: var(--surface2); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; padding: 0 12px; gap: 6px; flex-shrink: 0;
  }
  .canvas-container {
    flex: 1; overflow: auto; display: flex;
    align-items: flex-start; justify-content: flex-start; padding: 24px;
    background:
      repeating-linear-gradient(0deg,   transparent, transparent 23px, rgba(48,54,61,.4) 23px, rgba(48,54,61,.4) 24px),
      repeating-linear-gradient(90deg,  transparent, transparent 23px, rgba(48,54,61,.4) 23px, rgba(48,54,61,.4) 24px);
  }
  .board {
    display: grid; border: 2px solid var(--border); border-radius: 4px;
    box-shadow: 0 4px 24px rgba(0,0,0,.5); flex-shrink: 0;
  }
  .cell {
    border: 1px solid rgba(0,0,0,.15);
    display: flex; align-items: center; justify-content: center;
    position: relative; cursor: pointer; user-select: none;
    transition: filter .1s;
  }
  .cell:hover  { filter: brightness(1.2); }
  .cell.drag-over { outline: 2px solid var(--primary); outline-offset: -2px; }
  .cell.selected  { outline: 3px solid var(--primary); outline-offset: -3px; }
  .cell .piece-label {
    position: absolute; bottom: 2px; right: 3px;
    font-size: 9px; color: rgba(0,0,0,.5); pointer-events: none;
  }
  .inspector {
    width: 220px; background: var(--surface); border-left: 1px solid var(--border);
    display: flex; flex-direction: column; flex-shrink: 0;
  }
  .inspector h3 {
    padding: 12px 14px; font-size: 13px; font-weight: 600;
    border-bottom: 1px solid var(--border); color: var(--muted);
  }
  .inspector-body { padding: 14px; flex: 1; overflow-y: auto; }
  .inspector-empty { color: var(--muted); font-size: 13px; text-align: center; margin-top: 40px; }
  .statusbar {
    height: 24px; background: var(--primary); display: flex; align-items: center;
    padding: 0 12px; gap: 16px; font-size: 11px; flex-shrink: 0;
  }
  .statusbar span { opacity: .85; }
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.7);
    display: none; align-items: center; justify-content: center; z-index: 999;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 28px; width: 360px;
    box-shadow: 0 16px 48px rgba(0,0,0,.6);
  }
  .modal h3 { margin-bottom: 18px; font-size: 16px; }
  .modal-row { margin-bottom: 14px; }
  .modal-row label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 5px; }
  .modal-input {
    width: 100%; background: var(--bg); border: 1px solid var(--border);
    border-radius: 6px; padding: 8px 12px; color: var(--text); font-size: 14px;
  }
  .modal-input:focus { outline: none; border-color: var(--primary); }
  .modal-footer { display: flex; gap: 10px; margin-top: 20px; justify-content: flex-end; }
  .btn { padding: 8px 18px; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; }
  .btn-primary { background: var(--primary); color: #fff; }
  .btn-ghost   { background: none; border: 1px solid var(--border); color: var(--text); }
  .dropdown { position: relative; }
  .dropdown-menu {
    position: absolute; top: calc(100% + 6px); left: 0;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 4px; min-width: 160px;
    box-shadow: 0 8px 24px rgba(0,0,0,.4); z-index: 200; display: none;
  }
  .dropdown-menu.show { display: block; }
  .dmenu-item {
    padding: 8px 12px; border-radius: 5px; font-size: 13px; cursor: pointer;
    display: flex; align-items: center; gap: 8px;
  }
  .dmenu-item:hover { background: var(--surface2); }
  .dmenu-sep { height: 1px; background: var(--border); margin: 4px 0; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<div class="toolbar">
  <span class="toolbar-brand">♟ 棋局设计器</span>
  <div class="toolbar-sep"></div>
  <div class="dropdown" id="fileMenu">
    <button class="tbtn" onclick="toggleMenu('fileMenu')">📁 文件</button>
    <div class="dropdown-menu" id="fileMenuList">
      <div class="dmenu-item" onclick="openNewBoardModal();closeAllMenus()">➕ 新建棋盘</div>
      <div class="dmenu-item" onclick="saveBoard()">💾 保存到本地</div>
      <div class="dmenu-item" onclick="loadBoard()">📂 读取存档</div>
      <div class="dmenu-sep"></div>
      <div class="dmenu-item" onclick="exportBoard()">📤 导出 JSON</div>
      <div class="dmenu-item" onclick="document.getElementById('importFile').click();closeAllMenus()">📥 导入 JSON</div>
    </div>
  </div>
  <div class="toolbar-sep"></div>
  <button class="tbtn active" id="tool-select" onclick="setTool('select')">🖱 选择</button>
  <button class="tbtn"        id="tool-place"  onclick="setTool('place')">✏️ 放置</button>
  <button class="tbtn"        id="tool-move"   onclick="setTool('move')">✋ 移动</button>
  <button class="tbtn"        id="tool-erase"  onclick="setTool('erase')">🧹 橡皮</button>
  <div class="toolbar-sep"></div>
  <button class="tbtn" onclick="zoom(-1)">－</button>
  <span id="zoomLabel" style="font-size:13px;color:var(--muted);min-width:44px;text-align:center;">100%</span>
  <button class="tbtn" onclick="zoom(1)">＋</button>
  <button class="tbtn" onclick="zoom(0)">⊙</button>
  <div class="toolbar-right">
    <button class="tbtn" style="background:var(--primary);border-color:var(--primary);color:#fff;" onclick="openNewBoardModal()">＋ 新棋盘</button>
    <div class="user-chip" onclick="toggleMenu('userMenu')">
      <div class="avatar" id="userAvatar">?</div>
      <span id="userName">游客</span>
    </div>
    <div class="dropdown" id="userMenu">
      <div class="dropdown-menu" id="userMenuList" style="right:0;left:auto;">
        <div class="dmenu-item" id="menuLogin"  onclick="location.href='auth.html'">🔑 登录 / 注册</div>
        <div class="dmenu-item" id="menuProfile" style="display:none" onclick="location.href='profile.html'">👤 个人中心</div>
        <div class="dmenu-sep" id="menuSep" style="display:none"></div>
        <div class="dmenu-item" id="menuLogout" style="display:none" onclick="logout()">🚪 退出登录</div>
      </div>
    </div>
  </div>
</div>

<div class="main">
  <div class="sidebar">
    <div class="panel-tabs">
      <button class="ptab active" onclick="switchPanel('pieces')">棋子</button>
      <button class="ptab"        onclick="switchPanel('board')">棋盘</button>
      <button class="ptab"        onclick="switchPanel('layers')">图层</button>
    </div>
    <div class="panel-body" id="panel-pieces">
      <div class="panel-section">
        <h4>标准棋子</h4>
        <div class="piece-grid" id="pieceGrid"></div>
      </div>
      <div class="panel-section">
        <h4>棋子颜色</h4>
        <div class="color-row" id="colorRow"></div>
      </div>
    </div>
    <div class="panel-body" id="panel-board" style="display:none">
      <div class="panel-section">
        <h4>棋盘尺寸</h4>
        <div class="prop-row"><span class="prop-label">行数</span>
          <input class="prop-input" id="propRows" type="number" min="2" max="24" value="8" onchange="resizeBoard()"></div>
        <div class="prop-row"><span class="prop-label">列数</span>
          <input class="prop-input" id="propCols" type="number" min="2" max="24" value="8" onchange="resizeBoard()"></div>
      </div>
      <div class="panel-section">
        <h4>格子样式</h4>
        <div class="prop-row"><span class="prop-label">格子大小</span>
          <input class="prop-input" id="propCellSize" type="number" min="36" max="100" value="60" onchange="applyCellSize()"></div>
        <div class="prop-row"><span class="prop-label">棋盘样式</span>
          <select class="prop-input" id="propStyle" onchange="applyBoardStyle()">
            <option value="chess">国际象棋</option>
            <option value="go">围棋</option>
            <option value="plain">纯色</option>
          </select></div>
      </div>
      <div class="panel-section">
        <h4>格子颜色</h4>
        <div class="prop-row"><span class="prop-label">浅色格</span>
          <input type="color" id="colorLight" value="#f0d9b5" onchange="renderBoard()" style="cursor:pointer;border:none;background:none;width:36px;height:28px;"></div>
        <div class="prop-row"><span class="prop-label">深色格</span>
          <input type="color" id="colorDark"  value="#b58863" onchange="renderBoard()" style="cursor:pointer;border:none;background:none;width:36px;height:28px;"></div>
      </div>
    </div>
    <div class="panel-body" id="panel-layers" style="display:none">
      <div class="panel-section">
        <h4>图层</h4>
        <div id="layerList"></div>
      </div>
    </div>
  </div>

  <div class="canvas-wrap">
    <div class="canvas-toolbar">
      <span style="font-size:12px;color:var(--muted)">棋盘：</span>
      <span id="boardNameLabel" style="font-size:13px;font-weight:600">未命名棋盘</span>
      <span style="margin-left:auto;font-size:12px;color:var(--muted)" id="cellInfo">点击格子放置棋子</span>
    </div>
    <div class="canvas-container" id="canvasContainer">
      <div id="boardWrap" style="transform-origin:top left;">
        <div class="board" id="board"></div>
      </div>
    </div>
  </div>

  <div class="inspector">
    <h3>🔍 属性</h3>
    <div class="inspector-body" id="inspectorBody">
      <div class="inspector-empty">选中格子<br>查看属性</div>
    </div>
  </div>
</div>

<div class="statusbar">
  <span id="sTool">工具：选择</span>
  <span id="sPiece">棋子：♙ 兵</span>
  <span id="sCell">格子：-</span>
  <span style="margin-left:auto" id="sCount">棋子数：0</span>
</div>

<!-- 新建棋盘 -->
<div class="modal-overlay" id="newBoardModal">
  <div class="modal">
    <h3>➕ 新建棋盘</h3>
    <div class="modal-row"><label>棋盘名称</label>
      <input class="modal-input" id="nbName" placeholder="例如：我的象棋"></div>
    <div class="modal-row"><label>行数</label>
      <input class="modal-input" id="nbRows" type="number" min="2" max="24" value="8"></div>
    <div class="modal-row"><label>列数</label>
      <input class="modal-input" id="nbCols" type="number" min="2" max="24" value="8"></div>
    <div class="modal-row"><label>棋盘样式</label>
      <select class="modal-input" id="nbStyle">
        <option value="chess">国际象棋</option>
        <option value="go">围棋</option>
        <option value="plain">纯色</option>
      </select></div>
    <div class="modal-footer">
      <button class="btn btn-ghost"   onclick="closeModal('newBoardModal')">取消</button>
      <button class="btn btn-primary" onclick="confirmNewBoard()">创建</button>
    </div>
  </div>
</div>

<input type="file" id="importFile" accept=".json" style="display:none" onchange="handleImport(event)">

<script>
// Global state
const S = {
  tool: 'select', piece: '♙', pieceName: '兵', color: '#fff',
  rows: 8, cols: 8, cellSize: 60, boardStyle: 'chess',
  cells: {}, selected: null, zoomVal: 1, boardName: '未命名棋盘',
  dragging: null
};

const PIECES = [
  {i:'♔',n:'国王'}, {i:'♕',n:'皇后'}, {i:'♖',n:'城堡'},
  {i:'♗',n:'主教'}, {i:'♘',n:'骑士'}, {i:'♙',n:'兵'},
  {i:'♚',n:'黑王'}, {i:'♛',n:'黑后'}, {i:'♜',n:'黑城'}
];

const COLORS = ['#ffffff','#000000','#e94560','#3fb950','#d29922','#58a6ff','#ff7b72'];

const API_BASE = 'https://custom-board-games-production.up.railway.app/api/auth';

// Check login status and update UI
function checkLogin() {
  const token = localStorage.getItem('accessToken');
  const user = localStorage.getItem('user');
  
  if (token && user) {
    try {
      const userData = JSON.parse(user);
      document.getElementById('userName').textContent = userData.username || 'User';
      document.getElementById('userAvatar').textContent = userData.username.charAt(0).toUpperCase();
      document.getElementById('menuLogin').style.display = 'none';
      document.getElementById('menuProfile').style.display = 'block';
      document.getElementById('menuSep').style.display = 'block';
      document.getElementById('menuLogout').style.display = 'block';
    } catch (err) {
      logout();
    }
  } else {
    location.href = 'auth.html';
  }
}

// 退出登录
function logout() {
  localStorage.removeItem('accessToken');
  localStorage.removeItem('user');
  location.href = 'auth.html';
}

// ── Token 管理 ────────────────────────────────────────
function getToken() { return localStorage.getItem('accessToken'); }

async function fetchWithAuth(url, options = {}) {
  const token = getToken();
  const headers = { 'Content-Type': 'application/json', ...options.headers };
  if (token) headers['Authorization'] = 'Bearer ' + token;
  let res = await fetch(API_BASE + url, { ...options, headers, credentials: 'include' });
  if (res.status === 401) {
    const refreshed = await tryRefreshToken();
    if (refreshed) {
      headers['Authorization'] = 'Bearer ' + getToken();
      res = await fetch(API_BASE + url, { ...options, headers, credentials: 'include' });
    } else {
      return null;
    }
  }
  return res;
}

async function tryRefreshToken() {
  try {
    const res = await fetch(API_BASE + '/refresh', { method:'POST', credentials:'include' });
    if (res.ok) {
      const d = await res.json();
      localStorage.setItem('accessToken', d.data.accessToken);
      return true;
    }
  } catch {}
  return false;
}

// ── 初始化 ────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  renderPieceGrid(); renderColorRow(); renderBoard(); renderLayers(); checkLogin();
  document.addEventListener('click', e => {
    if (!e.target.closest('.dropdown') && !e.target.closest('.user-chip')) closeAllMenus();
    if (e.target.classList.contains('modal-overlay')) e.target.classList.remove('show');
  });
});

function renderPieceGrid() {
  document.getElementById('pieceGrid').innerHTML = PIECES.map(p =>
    '<div class="piece-item ' + (p.i===S.piece?'sel':'') + '" draggable="true"' +
    ' ondragstart="S.dragging={i:\'' + p.i + '\',n:\'' + p.n + '\'};event.dataTransfer.effectAllowed=\'copy\'"' +
    ' onclick="S.piece=this.dataset.i;S.pieceName=this.dataset.n;document.getElementById(\'sPiece\').textContent=\'棋子：\'+S.piece+\' \'+S.pieceName;renderPieceGrid()"' +
    ' data-i="' + p.i + '" data-n="' + p.n + '" title="' + p.n + '">' + p.i + '<span>' + p.n + '</span></div>'
  ).join('');
}

function renderColorRow() {
  document.getElementById('colorRow').innerHTML = COLORS.map(c =>
    '<div class="color-dot ' + (c===S.color?'active':'') + '" style="background:' + c + '"' +
    ' onclick="S.color=\'' + c + '\';renderColorRow()" title="' + c + '"></div>'
  ).join('');
}

function setTool(t) {
  S.tool = t;
  ['select','place','move','erase'].forEach(n =>
    document.getElementById('tool-'+n).classList.toggle('active', n===t));
  document.getElementById('sTool').textContent = '工具：'+{select:'选择',place:'放置',move:'移动',erase:'橡皮'}[t];
}

function zoom(dir) {
  if (dir===0) S.zoomVal=1;
  else S.zoomVal = Math.min(2.5, Math.max(0.4, S.zoomVal + dir*0.15));
  document.getElementById('boardWrap').style.transform = 'scale(' + S.zoomVal + ')';
  document.getElementById('zoomLabel').textContent = Math.round(S.zoomVal*100)+'%';
}

function switchPanel(name) {
  ['pieces','board','layers'].forEach(n =>
    document.getElementById('panel-'+n).style.display = n===name?'':'none');
  document.querySelectorAll('.ptab').forEach((t,i) =>
    t.classList.toggle('active', ['pieces','board','layers'][i]===name));
}

function getCellBg(r, c) {
  if (S.boardStyle==='plain') return 'var(--surface2)';
  if (S.boardStyle==='go')    return '#dcb468';
  const l = document.getElementById('colorLight').value;
  const d = document.getElementById('colorDark').value;
  return (r+c)%2===0 ? l : d;
}

function renderBoard() {
  const board = document.getElementById('board');
  board.style.gridTemplateColumns = 'repeat(' + S.cols + ',' + S.cellSize + 'px)';
  board.innerHTML = '';
  for (let r=0; r<S.rows; r++) {
    for (let c=0; c<S.cols; c++) {
      const key = r+','+c;
      const d   = S.cells[key];
      const el  = document.createElement('div');
      el.className = 'cell' + (S.selected===key?' selected':'');
      el.style.cssText = 'width:'+S.cellSize+'px;height:'+S.cellSize+'px;font-size:'+Math.round(S.cellSize*.48)+'px;background:'+getCellBg(r,c);
      if (d) {
        el.textContent = d.i;
        el.style.color = d.color;
        const lbl = document.createElement('span');
        lbl.className = 'piece-label'; lbl.textContent = d.n||'';
        el.appendChild(lbl);
      }
      el.addEventListener('click',     () => handleCell(r,c));
      el.addEventListener('dragover',  e  => { e.preventDefault(); el.classList.add('drag-over'); });
      el.addEventListener('dragleave', ()  => el.classList.remove('drag-over'));
      el.addEventListener('drop',      e  => {
        e.preventDefault(); el.classList.remove('drag-over');
        if (S.dragging) { S.cells[key]={i:S.dragging.i,n:S.dragging.n,color:S.color}; S.dragging=null; renderBoard(); }
      });
      el.addEventListener('mouseenter',() => {
        document.getElementById('cellInfo').textContent = '格子：('+(r+1)+','+(c+1)+')';
        document.getElementById('sCell').textContent    = '格子：('+(r+1)+','+(c+1)+')';
      });
      board.appendChild(el);
    }
  }
  document.getElementById('sCount').textContent = '棋子数：'+Object.keys(S.cells).length;
}

function handleCell(r, c) {
  const key = r+','+c;
  if (S.tool==='erase')  { delete S.cells[key]; S.selected=null; renderBoard(); showInspector(null); return; }
  if (S.tool==='move' && S.selected && S.selected!==key) {
    if (S.cells[S.selected]) { S.cells[key]=S.cells[S.selected]; delete S.cells[S.selected]; }
    S.selected=null; renderBoard(); return;
  }
  if (S.tool==='place') { S.cells[key]={i:S.piece,n:S.pieceName,color:S.color}; S.selected=key; renderBoard(); showInspector(key); return; }
  S.selected = S.selected===key ? null : key;
  renderBoard(); showInspector(S.selected);
}

function showInspector(key) {
  const body = document.getElementById('inspectorBody');
  if (!key || !S.cells[key]) { body.innerHTML='<div class="inspector-empty">选中格子<br>查看属性</div>'; return; }
  const d = S.cells[key]; const [r,c] = key.split(',');
  body.innerHTML =
    '<div class="prop-row"><span class="prop-label">位置</span><span>('+( +r+1)+', '+(+c+1)+')</span></div>' +
    '<div class="prop-row"><span class="prop-label">棋子</span><span style="font-size:26px">'+d.i+'</span></div>' +
    '<div class="prop-row"><span class="prop-label">名称</span>' +
    '<input class="prop-input" value="'+(d.n||'')+'" onchange="S.cells[\''+key+'\'].n=this.value;renderBoard()"></div>' +
    '<div class="prop-row"><span class="prop-label">颜色</span>' +
    '<input type="color" value="'+(d.color||'#ffffff')+'" style="cursor:pointer;border:none;background:none;width:36px;height:28px"' +
    ' onchange="S.cells[\''+key+'\'].color=this.value;renderBoard()"></div>' +
    '<div style="margin-top:16px">' +
    '<button class="btn btn-ghost" style="width:100%;font-size:12px"' +
    ' onclick="delete S.cells[\''+key+'\'];S.selected=null;renderBoard();showInspector(null)">🗑 删除棋子</button></div>';
}

function resizeBoard() {
  S.rows=+document.getElementById('propRows').value;
  S.cols=+document.getElementById('propCols').value;
  Object.keys(S.cells).forEach(k=>{const[r,c]=k.split(',').map(Number);if(r>=S.rows||c>=S.cols)delete S.cells[k];});
  renderBoard();
}
function applyCellSize()  { S.cellSize=+document.getElementById('propCellSize').value; renderBoard(); }
function applyBoardStyle(){ S.boardStyle=document.getElementById('propStyle').value; renderBoard(); }

function renderLayers() {
  document.getElementById('layerList').innerHTML = ['棋子层','背景层'].map((n,i) =>
    '<div style="display:flex;align-items:center;gap:8px;padding:8px 10px;' +
    'background:var(--surface2);border-radius:6px;margin-bottom:6px;' +
    'border:1px solid '+(i===0?'var(--primary)':'var(--border)')+';">' +
    '<span>📄</span><span style="font-size:13px;flex:1">'+n+'</span>' +
    (i===0?'<span style="font-size:11px;color:var(--muted)">默认</span>':'') +
    '</div>'
  ).join('');
}

function openNewBoardModal() { document.getElementById('newBoardModal').classList.add('show'); }
function closeModal(id)      { document.getElementById(id).classList.remove('show'); }

function confirmNewBoard() {
  S.boardName  = document.getElementById('nbName').value.trim()||'未命名棋盘';
  S.rows       = +document.getElementById('nbRows').value;
  S.cols       = +document.getElementById('nbCols').value;
  S.boardStyle = document.getElementById('nbStyle').value;
  S.cells = {}; S.selected = null;
  document.getElementById('boardNameLabel').textContent = S.boardName;
  document.getElementById('propRows').value  = S.rows;
  document.getElementById('propCols').value  = S.cols;
  document.getElementById('propStyle').value = S.boardStyle;
  renderBoard(); closeModal('newBoardModal');
}

function getBoardData() {
  return { name:S.boardName, rows:S.rows, cols:S.cols, boardStyle:S.boardStyle, cells:S.cells };
}
function saveBoard() {
  localStorage.setItem('cbg_board', JSON.stringify(getBoardData()));
  toast('✅ 已保存'); closeAllMenus();
}
function loadBoard() {
  const raw = localStorage.getItem('cbg_board');
  if (!raw) { toast('暂无存档','error'); return; }
  applyBoardData(JSON.parse(raw)); toast('✅ 读取成功'); closeAllMenus();
}
function exportBoard() {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([JSON.stringify(getBoardData(),null,2)],{type:'application/json'}));
  a.download = S.boardName+'.json'; a.click(); closeAllMenus();
}
function handleImport(e) {
  const f = e.target.files[0]; if(!f) return;
  const r = new FileReader();
  r.onload = ev => { try { applyBoardData(JSON.parse(ev.target.result)); toast('✅ 导入成功'); } catch(err){ toast('文件格式错误','error'); } };
  r.readAsText(f);
}
function applyBoardData(d) {
  S.boardName=d.name||'未命名棋盘'; S.rows=d.rows||8; S.cols=d.cols||8;
  S.boardStyle=d.boardStyle||'chess'; S.cells=d.cells||{};
  document.getElementById('boardNameLabel').textContent = S.boardName;
  document.getElementById('propRows').value  = S.rows;
  document.getElementById('propCols').value  = S.cols;
  document.getElementById('propStyle').value = S.boardStyle;
  renderBoard();
}

function toast(msg, type) {
  type = type || 'success';
  const t = document.createElement('div');
  t.textContent = msg;
  Object.assign(t.style, {
    position:'fixed', bottom:'36px', left:'50%', transform:'translateX(-50%)',
    background: type==='error' ? '#e94560' : '#3fb950',
    color:'#fff', padding:'10px 22px', borderRadius:'8px', fontSize:'14px',
    zIndex:'9999', boxShadow:'0 4px 16px rgba(0,0,0,.4)', pointerEvents:'none',
  });
  document.body.appendChild(t);
  setTimeout(function(){ t.remove(); }, 2200);
}

function toggleMenu(id) {
  const el = document.getElementById(id+'List');
  const was = el.classList.contains('show');
  closeAllMenus(); if(!was) el.classList.add('show');
}
function closeAllMenus() {
  document.querySelectorAll('.dropdown-menu').forEach(function(m){ m.classList.remove('show'); });
}
</script>
</body>
</html>
